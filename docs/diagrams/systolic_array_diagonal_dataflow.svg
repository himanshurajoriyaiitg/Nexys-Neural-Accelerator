<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Systolic array diagonal dataflow</title>
<desc>4x4 systolic array showing A values flowing right and B values flowing down, with accumulated results stored in C BRAM.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #2c2c2a; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; }
    .pe  { fill: #faeeda; stroke: #854f0b; stroke-width: 0.5; }
    .cbr { fill: #e1f5ee; stroke: #0f6e56; stroke-width: 0.5; }
  </style>
</defs>
<text class="th" x="340" y="28" text-anchor="middle">4×4 systolic array — diagonal dataflow</text>
<!-- Col headers -->
<text class="ts" x="160" y="64" text-anchor="middle">B col 0</text>
<text class="ts" x="250" y="64" text-anchor="middle">B col 1</text>
<text class="ts" x="340" y="64" text-anchor="middle">B col 2</text>
<text class="ts" x="430" y="64" text-anchor="middle">B col 3</text>
<!-- B arrows -->
<line x1="160" y1="70" x2="160" y2="90" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="250" y1="70" x2="250" y2="90" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="70" x2="340" y2="90" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="70" x2="430" y2="90" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Row labels -->
<text class="ts" x="60" y="116" text-anchor="middle">A row 0</text>
<text class="ts" x="60" y="206" text-anchor="middle">A row 1</text>
<text class="ts" x="60" y="296" text-anchor="middle">A row 2</text>
<text class="ts" x="60" y="386" text-anchor="middle">A row 3</text>
<!-- A arrows -->
<line x1="95" y1="116" x2="118" y2="116" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="95" y1="206" x2="118" y2="206" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="95" y1="296" x2="118" y2="296" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="95" y1="386" x2="118" y2="386" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Row 0 -->
<rect x="120" y="96" width="80" height="40" rx="6" class="pe"/><text class="th" x="160" y="116" text-anchor="middle" dominant-baseline="central">PE[0,0]</text>
<rect x="210" y="96" width="80" height="40" rx="6" class="pe"/><text class="th" x="250" y="116" text-anchor="middle" dominant-baseline="central">PE[0,1]</text>
<rect x="300" y="96" width="80" height="40" rx="6" class="pe"/><text class="th" x="340" y="116" text-anchor="middle" dominant-baseline="central">PE[0,2]</text>
<rect x="390" y="96" width="80" height="40" rx="6" class="pe"/><text class="th" x="430" y="116" text-anchor="middle" dominant-baseline="central">PE[0,3]</text>
<!-- Row 1 -->
<rect x="120" y="186" width="80" height="40" rx="6" class="pe"/><text class="th" x="160" y="206" text-anchor="middle" dominant-baseline="central">PE[1,0]</text>
<rect x="210" y="186" width="80" height="40" rx="6" class="pe"/><text class="th" x="250" y="206" text-anchor="middle" dominant-baseline="central">PE[1,1]</text>
<rect x="300" y="186" width="80" height="40" rx="6" class="pe"/><text class="th" x="340" y="206" text-anchor="middle" dominant-baseline="central">PE[1,2]</text>
<rect x="390" y="186" width="80" height="40" rx="6" class="pe"/><text class="th" x="430" y="206" text-anchor="middle" dominant-baseline="central">PE[1,3]</text>
<!-- Row 2 -->
<rect x="120" y="276" width="80" height="40" rx="6" class="pe"/><text class="th" x="160" y="296" text-anchor="middle" dominant-baseline="central">PE[2,0]</text>
<rect x="210" y="276" width="80" height="40" rx="6" class="pe"/><text class="th" x="250" y="296" text-anchor="middle" dominant-baseline="central">PE[2,1]</text>
<rect x="300" y="276" width="80" height="40" rx="6" class="pe"/><text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central">PE[2,2]</text>
<rect x="390" y="276" width="80" height="40" rx="6" class="pe"/><text class="th" x="430" y="296" text-anchor="middle" dominant-baseline="central">PE[2,3]</text>
<!-- Row 3 -->
<rect x="120" y="366" width="80" height="40" rx="6" class="pe"/><text class="th" x="160" y="386" text-anchor="middle" dominant-baseline="central">PE[3,0]</text>
<rect x="210" y="366" width="80" height="40" rx="6" class="pe"/><text class="th" x="250" y="386" text-anchor="middle" dominant-baseline="central">PE[3,1]</text>
<rect x="300" y="366" width="80" height="40" rx="6" class="pe"/><text class="th" x="340" y="386" text-anchor="middle" dominant-baseline="central">PE[3,2]</text>
<rect x="390" y="366" width="80" height="40" rx="6" class="pe"/><text class="th" x="430" y="386" text-anchor="middle" dominant-baseline="central">PE[3,3]</text>
<!-- Horizontal A arrows -->
<line x1="200" y1="116" x2="208" y2="116" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="290" y1="116" x2="298" y2="116" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="116" x2="388" y2="116" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="200" y1="206" x2="208" y2="206" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="290" y1="206" x2="298" y2="206" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="206" x2="388" y2="206" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="200" y1="296" x2="208" y2="296" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="290" y1="296" x2="298" y2="296" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="296" x2="388" y2="296" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="200" y1="386" x2="208" y2="386" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="290" y1="386" x2="298" y2="386" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="386" x2="388" y2="386" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Vertical B arrows -->
<line x1="160" y1="136" x2="160" y2="184" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="226" x2="160" y2="274" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="160" y1="316" x2="160" y2="364" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="250" y1="136" x2="250" y2="184" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="250" y1="226" x2="250" y2="274" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="250" y1="316" x2="250" y2="364" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="136" x2="340" y2="184" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="226" x2="340" y2="274" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="316" x2="340" y2="364" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="136" x2="430" y2="184" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="226" x2="430" y2="274" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="316" x2="430" y2="364" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- acc out arrows -->
<line x1="160" y1="406" x2="160" y2="428" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="250" y1="406" x2="250" y2="428" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="406" x2="340" y2="428" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="406" x2="430" y2="428" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- C BRAM -->
<rect x="120" y="432" width="390" height="36" rx="8" class="cbr"/>
<text class="th" x="315" y="450" text-anchor="middle" dominant-baseline="central">C BRAM — accumulated results</text>
<!-- Legend -->
<line x1="510" y1="140" x2="534" y2="140" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="144">A flows right</text>
<line x1="510" y1="164" x2="534" y2="164" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="168">B flows down</text>
<line x1="510" y1="188" x2="534" y2="188" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="192">acc out</text>
<text class="ts" x="340" y="486" text-anchor="middle">Each PE: acc += a_in × b_in every clock. Inputs are diagonally skewed at the boundary.</text>
</svg>
