<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Top-level data flow</title>
<desc>Full pipeline from PC C host through UART to Nexys A7 FPGA, through BRAM and systolic array, and back to PC Python checker.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #2c2c2a; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; }
    .box-teal   { fill: #e1f5ee; stroke: #0f6e56; }
    .box-purple { fill: #eeedfe; stroke: #534ab7; }
    .box-blue   { fill: #e6f1fb; stroke: #185fa5; }
    .box-coral  { fill: #faece7; stroke: #993c1d; }
    .box-amber  { fill: #faeeda; stroke: #854f0b; }
    .arr-line   { fill: none; stroke: #888780; stroke-width: 1.5; }
    .arr-orange { fill: none; stroke: #D85A30; stroke-width: 1.5; }
    .arr-blue   { fill: none; stroke: #378ADD; stroke-width: 1.5; }
    .arr-green  { fill: none; stroke: #1D9E75; stroke-width: 1.5; }
  </style>
</defs>
<!-- PC Host -->
<rect x="40" y="40" width="140" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th" x="110" y="62" text-anchor="middle" dominant-baseline="central">PC host</text>
<text class="ts" x="110" y="80" text-anchor="middle" dominant-baseline="central">uart_host.c</text>
<!-- UART TX -->
<line x1="180" y1="68" x2="228" y2="68" class="arr-line" marker-end="url(#arrow)"/>
<text class="ts" x="204" y="60" text-anchor="middle">UART TX</text>
<!-- FPGA container -->
<rect x="232" y="20" width="290" height="460" rx="14" class="box-purple" stroke-width="0.5"/>
<text class="th" x="377" y="46" text-anchor="middle" dominant-baseline="central">nexys_a7_top.v</text>
<!-- Command Parser -->
<rect x="254" y="62" width="160" height="44" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th" x="334" y="84" text-anchor="middle" dominant-baseline="central">Command parser</text>
<line x1="334" y1="106" x2="334" y2="138" class="arr-line" marker-end="url(#arrow)"/>
<!-- A BRAM -->
<rect x="254" y="142" width="112" height="44" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th" x="310" y="158" text-anchor="middle" dominant-baseline="central">A BRAM</text>
<text class="ts" x="310" y="174" text-anchor="middle" dominant-baseline="central">a_bram.v</text>
<!-- B BRAM -->
<rect x="380" y="142" width="112" height="44" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th" x="436" y="158" text-anchor="middle" dominant-baseline="central">B BRAM</text>
<text class="ts" x="436" y="174" text-anchor="middle" dominant-baseline="central">b_bram.v</text>
<!-- Arrows to controller -->
<line x1="310" y1="186" x2="334" y2="230" class="arr-line" marker-end="url(#arrow)"/>
<line x1="436" y1="186" x2="412" y2="230" class="arr-line" marker-end="url(#arrow)"/>
<!-- Controller -->
<rect x="277" y="234" width="200" height="44" rx="8" class="box-coral" stroke-width="0.5"/>
<text class="th" x="377" y="250" text-anchor="middle" dominant-baseline="central">Controller FSM</text>
<text class="ts" x="377" y="268" text-anchor="middle" dominant-baseline="central">controller.v</text>
<line x1="377" y1="278" x2="377" y2="314" class="arr-line" marker-end="url(#arrow)"/>
<!-- Systolic array -->
<rect x="254" y="318" width="246" height="56" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="th" x="377" y="340" text-anchor="middle" dominant-baseline="central">Systolic array</text>
<text class="ts" x="377" y="358" text-anchor="middle" dominant-baseline="central">systolic_array.v — N×N PEs</text>
<line x1="377" y1="374" x2="377" y2="408" class="arr-line" marker-end="url(#arrow)"/>
<!-- C BRAM -->
<rect x="297" y="412" width="160" height="44" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th" x="377" y="428" text-anchor="middle" dominant-baseline="central">C BRAM</text>
<text class="ts" x="377" y="446" text-anchor="middle" dominant-baseline="central">c_bram.v — 32-bit acc</text>
<!-- UART RX -->
<line x1="522" y1="434" x2="570" y2="434" class="arr-line" marker-end="url(#arrow)"/>
<text class="ts" x="546" y="426" text-anchor="middle">UART RX</text>
<!-- Python checker -->
<rect x="574" y="406" width="66" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th" x="607" y="428" text-anchor="middle" dominant-baseline="central">Python</text>
<text class="ts" x="607" y="446" text-anchor="middle" dominant-baseline="central">checker</text>
<text class="ts" x="607" y="480" text-anchor="middle">PASS / FAIL</text>
<text class="ts" x="377" y="494" text-anchor="middle">LED[15:0] — cycle count + status flags</text>
</svg>
